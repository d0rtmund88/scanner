<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mehrzeilen Verkaufsscanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background-color: #f5f7fa; color: #333; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; color: #1a365d; font-size: 20px; margin: 10px 0; }
        .setup-box { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 10px; text-align: center; }
        select { width: 100%; padding: 8px; margin: 8px 0; font-size: 15px; border-radius: 6px; border: 1px solid #cbd5e0; }
        
        .scanner-wrapper {
            position: relative;
            width: 100%;
            max-height: 280px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 10px;
            background: #000;
        }
        #reader { 
            width: 100%; 
            max-height: 280px; 
        }
        #reader video {
            max-height: 280px !important; 
            object-fit: cover; 
        }

        .scan-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 0 200px rgba(0, 0, 0, 0.4);
        }
        .scan-box {
            width: 160px;  
            height: 160px;
            position: relative;
            box-sizing: border-box;
        }
        .scan-box::before, .scan-box::after, .scan-box span::before, .scan-box span::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            border: 4px solid #2ecc71; 
        }
        .scan-box::before { top: 0; left: 0; border-right: none; border-bottom: none; }
        .scan-box::after { top: 0; right: 0; border-left: none; border-bottom: none; }
        .scan-box span::before { bottom: 0; left: 0; border-right: none; border-top: none; }
        .scan-box span::after { bottom: 0; right: 0; border-left: none; border-top: none; }

        button { color: white; border: none; padding: 10px 15px; font-size: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; margin-bottom: 8px; }
        .start-btn { background-color: #3182ce; }
        .stop-btn { background-color: #e53e3e; }
        .download-btn { background-color: #3182ce; margin-top: 10px; }
        
        .table-container { background: white; border-radius: 8px; overflow-x: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th, td { padding: 8px 10px; text-align: left; font-size: 12px; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #edf2f7; color: #4a5568; font-weight: 600; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Mehrzeilen Barcode-Scanner</h1>
        
        <div class="setup-box">
            <button class="start-btn" id="initBtn" onclick="berechtigungAnfordern()">1. Kameras suchen & erlauben</button>
            <div id="cameraSelectContainer" style="display:none;">
                <label for="cameraSelect"><b>Wähle eine Kamera:</b></label>
                <select id="cameraSelect"></select>
                <button class="start-btn" onclick="startScanning()">2. Kamera-Stream starten</button>
            </div>
            <button class="stop-btn" id="stopBtn" onclick="stopScanning()" style="display:none;">Scanner stoppen</button>
        </div>

        <div class="scanner-wrapper">
            <div id="reader"></div>
            <div class="scan-overlay" id="overlay" style="display:none;">
                <div class="scan-box"><span></span></div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Zeit</th>
                        <th>Zeile 1</th>
                        <th>Zeile 2</th>
                        <th>Zeile 3</th>
                        <th>Zeile 4</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr id="noDataRow"><td colspan="5" style="text-align:center; color:#718096;">Noch keine Geräte gescannt</td></tr>
                </tbody>
            </table>
        </div>

        <button class="download-btn" onclick="exportToTXT()">Liste als Textdokument herunterladen</button>
    </div>

    <script>
        const scannedItems = [];
        let html5QrCode;
        let lastAudioTime = 0; 

        function berechtigungAnfordern() {
            Html5Qrcode.getCameras().then(devices => {
                if (devices && devices.length > 0) {
                    const select = document.getElementById('cameraSelect');
                    select.innerHTML = ''; 
                    devices.forEach((device, index) => {
                        const option = document.createElement('option');
                        option.value = device.id;
                        option.text = device.label || "Kamera " + (index + 1);
                        select.appendChild(option);
                    });
                    if(devices.length > 1) { select.selectedIndex = devices.length - 1; }
                    document.getElementById('cameraSelectContainer').style.display = 'block';
                    document.getElementById('initBtn').style.display = 'none';
                    html5QrCode = new Html5Qrcode("reader");
                } else { alert("Keine Kameras gefunden."); }
            }).catch(err => { alert("Fehler beim Zugriff auf Kameras: " + err); });
        }

        function startScanning() {
            const cameraId = document.getElementById('cameraSelect').value;
            html5QrCode.start(
                cameraId, 
                {
                    fps: 15, 
                    qrbox: { width: 160, height: 160 },
                    formatsToSupport: [ Html5QrcodeSupportedFormats.DATA_MATRIX, Html5QrcodeSupportedFormats.QR_CODE ]
                },
                onScanSuccess,
                onScanFailure
            ).then(() => {
                document.getElementById('cameraSelectContainer').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'block';
                document.getElementById('overlay').style.display = 'flex';
            }).catch(err => { alert("Kamera-Start fehlgeschlagen: " + err); });
        }

        function stopScanning() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('cameraSelectContainer').style.display = 'block';
                    document.getElementById('stopBtn').style.display = 'none';
                    document.getElementById('overlay').style.display = 'none';
                });
            }
        }

        // DIESE LOGIK TRENNT DEN INHALT PER ZEILENUMBRIUCH IN 4 SEPARATE WERTE
        function onScanSuccess(decodedText, decodedResult) {
            // GS1/Logistik-Steuerzeichen durch reguläre Zeilenumbrüche ersetzen, falls vorhanden
            let normalizedText = decodedText.replace(/[\x1D\x1E\x09]/g, '\n');
            
            // Text in Zeilen aufteilen
            let lines = normalizedText.split(/\r?\n/);
            
            // Leere Zeilen ausfiltern und Trimmen
            lines = lines.map(line => line.trim()).filter(line => line.length > 0);

            // Wenn gar kein Text da ist, abbrechen
            if (lines.length === 0) return;

            // Fülle exakt 4 Zeilen auf (falls ein Code mal weniger Zeilen hat)
            let z1 = lines[0] || "-";
            let z2 = lines[1] || "-";
            let z3 = lines[2] || "-";
            let z4 = lines[3] || "-";

            // Einzigartiger Schlüssel zur Vermeidung von Doppel-Scans (Kombination aus Zeile 1 und 2)
            const uniqueKey = z1 + "_" + z2;
            const existiertBereits = scannedItems.some(function(item) { return item.key === uniqueKey; });

            if (!existiertBereits) {
                const jetzt = Date.now();
                if (jetzt - lastAudioTime > 1000) {
                    try {
                        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        const osc = audioCtx.createOscillator();
                        osc.connect(audioCtx.destination);
                        osc.start(); osc.stop(0.08);
                        lastAudioTime = jetzt;
                    } catch(e) {}
                }

                const noDataRow = document.getElementById("noDataRow");
                if (noDataRow) noDataRow.remove();

                const timestamp = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                scannedItems.push({ timestamp: timestamp, key: uniqueKey, z1: z1, z2: z2, z3: z3, z4: z4 });

                const tableBody = document.getElementById("tableBody");
                const newRow = document.createElement("tr");

                const cellTime = document.createElement("td"); cellTime.textContent = timestamp;
                const cell1 = document.createElement("td"); cell1.textContent = z1;
                const cell2 = document.createElement("td"); cell2.textContent = z2;
                const cell3 = document.createElement("td"); cell3.textContent = z3;
                const cell4 = document.createElement("td"); cell4.textContent = z4;

                newRow.appendChild(cellTime);
                newRow.appendChild(cell1);
                newRow.appendChild(cell2);
                newRow.appendChild(cell3);
                newRow.appendChild(cell4);
                
                tableBody.insertBefore(newRow, tableBody.firstChild);
            }
        }

        function onScanFailure(error) {}

        // TEXT-EXPORT: REINE SPALTENTRENNUNG PER TABULATOR
        function exportToTXT() {
            if (scannedItems.length === 0) { alert("Die Liste ist leer!"); return; }
            
            // Header mit Tabulator-Abständen (\t sorgt für eine neue Spalte im Textdokument)
            let textContent = "Zeit\tZeile 1\tZeile 2\tZeile 3\tZeile 4\n";
            
            scannedItems.forEach(function(item) { 
                textContent += item.timestamp + "\t" + item.z1 + "\t" + item.z2 + "\t" + item.z3 + "\t" + item.z4 + "\n"; 
            });
            
            const blob = new Blob([textContent], { type: 'text/plain;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Verkaufsliste_Spalten_" + new Date().toISOString().slice(0,10) + ".txt";
            document.body.appendChild(link); 
            link.click(); 
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
