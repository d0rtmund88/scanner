<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR & DataMatrix Verkaufsscanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background-color: #f5f7fa; color: #333; }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { text-align: center; color: #1a365d; font-size: 20px; margin: 10px 0; }
        .setup-box { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 10px; text-align: center; }
        select { width: 100%; padding: 8px; margin: 8px 0; font-size: 15px; border-radius: 6px; border: 1px solid #cbd5e0; }
        
        .scanner-wrapper {
            position: relative;
            width: 100%;
            max-height: 320px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 10px;
            background: #000;
        }
        #reader { 
            width: 100%; 
            max-height: 320px; 
        }
        #reader video {
            max-height: 320px !important; 
            object-fit: cover; 
        }

        .scan-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 0 200px rgba(0, 0, 0, 0.4);
        }
        .scan-box {
            width: 200px;  
            height: 200px;
            position: relative;
            box-sizing: border-box;
        }
        .scan-box::before, .scan-box::after, .scan-box span::before, .scan-box span::after {
            content: "";
            position: absolute;
            width: 25px;
            height: 25px;
            border: 4px solid #2ecc71; 
        }
        .scan-box::before { top: 0; left: 0; border-right: none; border-bottom: none; }
        .scan-box::after { top: 0; right: 0; border-left: none; border-bottom: none; }
        .scan-box span::before { bottom: 0; left: 0; border-right: none; border-top: none; }
        .scan-box span::after { bottom: 0; right: 0; border-left: none; border-top: none; }

        button { color: white; border: none; padding: 10px 15px; font-size: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; margin-bottom: 8px; }
        .start-btn { background-color: #3182ce; }
        .stop-btn { background-color: #e53e3e; }
        .download-btn { background-color: #38a169; margin-top: 10px; }
        
        .table-container { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px 10px; text-align: left; font-size: 13px; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #edf2f7; color: #4a5568; font-weight: 600; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Verkaufsscanner (DataMatrix & QR)</h1>
        
        <div class="setup-box">
            <button class="start-btn" id="initBtn" onclick="berechtigungAnfordern()">1. Kameras suchen & erlauben</button>
            <div id="cameraSelectContainer" style="display:none;">
                <label for="cameraSelect"><b>Wähle eine Kamera:</b></label>
                <select id="cameraSelect"></select>
                <button class="start-btn" onclick="startScanning()">2. Kamera-Stream starten</button>
            </div>
            <button class="stop-btn" id="stopBtn" onclick="stopScanning()" style="style="display:none;"">Scanner stoppen</button>
        </div>

        <div class="scanner-wrapper">
            <div id="reader"></div>
            <div class="scan-overlay" id="overlay" style="display:none;">
                <div class="scan-box"><span></span></div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Zeit</th><th>Interne Nr.</th><th>Seriennummer</th></tr>
                </thead>
                <tbody id="tableBody">
                    <tr id="noDataRow"><td colspan="3" style="text-align:center; color:#718096;">Noch keine Geräte gescannt</td></tr>
                </tbody>
            </table>
        </div>

        <button class="download-btn" onclick="exportToCSV()">Liste als CSV herunterladen</button>
    </div>

    <script>
        const scannedItems = [];
        let html5QrCode;
        let lastAudioTime = 0; 

        function berechtigungAnfordern() {
            Html5Qrcode.getCameras().then(devices => {
                if (devices && devices.length > 0) {
                    const select = document.getElementById('cameraSelect');
                    select.innerHTML = ''; 
                    devices.forEach((device, index) => {
                        const option = document.createElement('option');
                        option.value = device.id;
                        option.text = device.label || "Kamera " + (index + 1);
                        select.appendChild(option);
                    });
                    if(devices.length > 1) { select.selectedIndex = devices.length - 1; }
                    document.getElementById('cameraSelectContainer').style.display = 'block';
                    document.getElementById('initBtn').style.display = 'none';
                    html5QrCode = new Html5Qrcode("reader");
                } else { alert("Keine Kameras gefunden."); }
            }).catch(err => { alert("Fehler beim Zugriff auf Kameras: " + err); });
        }

        function startScanning() {
            const cameraId = document.getElementById('cameraSelect').value;
            html5QrCode.start(
                cameraId, 
                {
                    fps: 15, 
                    qrbox: { width: 200, height: 200 },
                    formatsToSupport: [ Html5QrcodeSupportedFormats.DATA_MATRIX, Html5QrcodeSupportedFormats.QR_CODE ]
                },
                onScanSuccess,
                onScanFailure
            ).then(() => {
                document.getElementById('cameraSelectContainer').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'block';
                document.getElementById('overlay').style.display = 'flex';
            }).catch(err => { alert("Kamera-Start fehlgeschlagen: " + err); });
        }

        function stopScanning() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('cameraSelectContainer').style.display = 'block';
                    document.getElementById('stopBtn').style.display = 'none';
                    document.getElementById('overlay').style.display = 'none';
                });
            }
        }

        // HIER WURDE DIE TRENNUNG BOMBENSICHER NEU GEBAUT
        function onScanSuccess(decodedText, decodedResult) {
            let intNum = "Unbekannt";
            let serNum = "Unbekannt";
            
            // 1. Versuch: Logistisches GS-Steuerzeichen (\x1D) austauschen gegen ein Semikolon
            let cleanedText = decodedText.replace(/\x1D/g, ';').replace(/\x1E/g, ';').replace(/\x09/g, ';');
            
            // 2. Versuch: Nach gängigen Trennern splitten
            let parts = [];
            if (cleanedText.includes(';')) { parts = cleanedText.split(';'); }
            else if (cleanedText.includes(',')) { parts = cleanedText.split(','); }
            else { parts = cleanedText.split(/[\r\n\s]+/); } // Bei Zeilenumbruch oder Leerzeichen trennen

            // Leere Einträge entfernen
            parts = parts.filter(function(p) { return p.trim().length > 0; });

            if (parts.length >= 2) {
                intNum = parts[0].trim();
                serNum = parts[1].trim();
            } else if (parts.length === 1) {
                // Notfall-Fallback falls gar kein Trenner anschlägt: 
                // Wir suchen im Text nach "HR8_" (Anfang der internen Nummer auf deinem Etikett)
                let text = parts[0];
                let index = text.indexOf("HR8_");
                if (index !== -1) {
                    intNum = text.substring(index, index + 7); // Schneidet z.B. HR8_002 aus
                    // Der Rest wird als Seriennummer angenommen
                    serNum = text.replace(intNum, "").trim();
                } else {
                    intNum = text;
                }
            }

            const timestamp = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            const existiertBereits = scannedItems.some(function(item) { return item.serNum === serNum; });

            if (!existiertBereits) {
                const jetzt = Date.now();
                if (jetzt - lastAudioTime > 1000) {
                    try {
                        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        const osc = audioCtx.createOscillator();
                        osc.connect(audioCtx.destination);
                        osc.start(); osc.stop(0.08);
                        lastAudioTime = jetzt;
                    } catch(e) {}
                }

                const noDataRow = document.getElementById("noDataRow");
                if (noDataRow) noDataRow.remove();

                scannedItems.push({ timestamp: timestamp, intNum: intNum, serNum: serNum });

                const tableBody = document.getElementById("tableBody");
                const newRow = document.createElement("tr");

                const cell1 = document.createElement("td"); cell1.textContent = timestamp;
                const cell2 = document.createElement("td"); cell2.innerHTML = "<b>" + intNum + "</b>";
                const cell3 = document.createElement("td"); cell3.innerHTML = "<b>" + serNum + "</b>";

                newRow.appendChild(cell1); newRow.appendChild(cell2); newRow.appendChild(cell3);
                tableBody.insertBefore(newRow, tableBody.firstChild);
            }
        }

        function onScanFailure(error) {}

        function exportToCSV() {
            if (scannedItems.length === 0) { alert("Die Liste ist leer!"); return; }
            let csvContent = "\uFEFFZeitpunkt;Interne Nummer;Seriennummer\n";
            scannedItems.forEach(function(item) { csvContent += item.timestamp + ";" + item.intNum + ";" + item.serNum + "\n"; });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Verkaufsliste_" + new Date().toISOString().slice(0,10) + ".csv";
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }
    </script>
</body>
</html>
