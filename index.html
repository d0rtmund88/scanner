<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR-Code Verkaufsscanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background-color: #f5f7fa; color: #333; }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { text-align: center; color: #1a365d; font-size: 20px; margin: 10px 0; }
        .setup-box { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 10px; text-align: center; }
        select { width: 100%; padding: 8px; margin: 8px 0; font-size: 15px; border-radius: 6px; border: 1px solid #cbd5e0; }
        
        /* HIER WURDE DIE KAMERA KLEINER GEMACHT */
        #reader { 
            width: 100%; 
            max-height: 220px; /* Begrenzt die Höhe des Kamerafensters */
            background: #000; 
            border-radius: 8px; 
            overflow: hidden; 
            margin-bottom: 10px; 
        }
        #reader video {
            max-height: 220px !important; /* Erzwingt die kleinere Höhe auch für das Live-Video */
            object-fit: cover; /* Schneidet das Video sauber zu, damit es nicht verzerrt */
        }

        button { color: white; border: none; padding: 10px 15px; font-size: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; margin-bottom: 8px; }
        .start-btn { background-color: #3182ce; }
        .stop-btn { background-color: #e53e3e; }
        .download-btn { background-color: #38a169; margin-top: 10px; }
        
        /* Tabelle kompakter für Smartphones */
        .table-container { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px 10px; text-align: left; font-size: 13px; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #edf2f7; color: #4a5568; font-weight: 600; }
    </style>
</head>
<body>

    <div class="container">
        <h1>QR-Code Verkaufsscanner</h1>
        
        <div class="setup-box">
            <button class="start-btn" id="initBtn" onclick="berechtigungAnfordern()">1. Kameras suchen & erlauben</button>
            <div id="cameraSelectContainer" style="display:none;">
                <label for="cameraSelect"><b>Wähle eine Kamera:</b></label>
                <select id="cameraSelect"></select>
                <button class="start-btn" onclick="startScanning()">2. Kamera-Stream starten</button>
            </div>
            <button class="stop-btn" id="stopBtn" onclick="stopScanning()" style="display:none;">Scanner stoppen</button>
        </div>

        <div id="reader"></div>

        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Zeit</th><th>Interne Nr.</th><th>Seriennummer</th></tr>
                </thead>
                <tbody id="tableBody">
                    <tr id="noDataRow"><td colspan="3" style="text-align:center; color:#718096;">Noch keine Geräte gescannt</td></tr>
                </tbody>
            </table>
        </div>

        <button class="download-btn" onclick="exportToCSV()">Liste als CSV herunterladen</button>
    </div>

    <script>
        const scannedItems = [];
        let html5QrCode;

        function berechtigungAnfordern() {
            Html5Qrcode.getCameras().then(devices => {
                if (devices && devices.length > 0) {
                    const select = document.getElementById('cameraSelect');
                    select.innerHTML = ''; 
                    
                    devices.forEach((device, index) => {
                        const option = document.createElement('option');
                        option.value = device.id;
                        option.text = device.label || "Kamera " + (index + 1);
                        select.appendChild(option);
                    });

                    if(devices.length > 1) {
                        select.selectedIndex = devices.length - 1;
                    }

                    document.getElementById('cameraSelectContainer').style.display = 'block';
                    document.getElementById('initBtn').style.display = 'none';
                    
                    html5QrCode = new Html5Qrcode("reader");
                } else {
                    alert("Keine Kameras am Gerät gefunden.");
                }
            }).catch(err => {
                alert("Fehler beim Zugriff auf Kameras: " + err);
            });
        }

        function startScanning() {
            const cameraId = document.getElementById('cameraSelect').value;
            
            html5QrCode.start(
                cameraId, 
                {
                    fps: 10,
                    // Der Scan-Bereich wurde ebenfalls an die neue Höhe angepasst
                    qrbox: function(viewfinderWidth, viewfinderHeight) {
                        return { width: viewfinderWidth * 0.6, height: 150 };
                    }
                },
                onScanSuccess,
                onScanFailure
            ).then(() => {
                document.getElementById('cameraSelectContainer').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'block';
            }).catch(err => {
                alert("Kamera konnte nicht gestartet werden: " + err);
            });
        }

        function stopScanning() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('cameraSelectContainer').style.display = 'block';
                    document.getElementById('stopBtn').style.display = 'none';
                });
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                osc.connect(audioCtx.destination);
                osc.start(); osc.stop(0.08);
            } catch(e) {}

            let parts = decodedText.includes(';') ? decodedText.split(';') : (decodedText.includes(',') ? decodedText.split(',') : decodedText.split(/\r?\n/));
            const intNum = parts[0] ? parts[0].trim() : "Unbekannt";
            const serNum = parts[1] ? parts[1].trim() : "Unbekannt";
            const timestamp = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});

            const existiertBereits = scannedItems.some(function(item) { return item.serNum === serNum; });

            if (!existiertBereits) {
                const noDataRow = document.getElementById("noDataRow");
                if (noDataRow) noDataRow.remove();

                scannedItems.push({ timestamp: timestamp, intNum: intNum, serNum: serNum });

                const tableBody = document.getElementById("tableBody");
                const newRow = document.createElement("tr");

                const cell1 = document.createElement("td");
                cell1.textContent = timestamp;
                
                const cell2 = document.createElement("td");
                cell2.innerHTML = "<b>" + intNum + "</b>";
                
                const cell3 = document.createElement("td");
                cell3.innerHTML = "<b>" + serNum + "</b>";

                newRow.appendChild(cell1);
                newRow.appendChild(cell2);
                newRow.appendChild(cell3);
                
                // Fügt das neueste Element GANZ OBEN in der Tabelle ein, damit man es sofort sieht
                tableBody.insertBefore(newRow, tableBody.firstChild);
            }
        }

        function onScanFailure(error) {
            // Ignorieren (sucht im Hintergrund weiter)
        }

        function exportToCSV() {
            if (scannedItems.length === 0) { alert("Die Liste ist leer!"); return; }
            let csvContent = "\uFEFFZeitpunkt;Interne Nummer;Seriennummer\n";
            scannedItems.forEach(function(item) { 
                csvContent += item.timestamp + ";" + item.intNum + ";" + item.serNum + "\n"; 
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "Verkaufsliste_" + new Date().toISOString().slice(0,10) + ".csv";
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }
    </script>
</body>
</html>
